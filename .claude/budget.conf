# Claude Code Budget Configuration
# Edit these values to set your cost budgets

# Daily budget (USD) - Realistic for active development
DAILY_BUDGET=50.00

# Weekly budget (USD) - Allows 3-4 full development days
WEEKLY_BUDGET=200.00

# Monthly budget (USD) - Professional use
MONTHLY_BUDGET=500.00

# Alert thresholds (percentage of budget)
WARNING_THRESHOLD=80
CRITICAL_THRESHOLD=100

# Enable/disable alerts
ENABLE_DAILY_ALERTS=true
ENABLE_WEEKLY_ALERTS=true
ENABLE_MONTHLY_ALERTS=true
